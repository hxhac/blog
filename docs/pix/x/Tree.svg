<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" id="svgTag" contentstyletype="text/css" height="586px" preserveAspectRatio="none" style="width: 1557px; height: 586px; background: rgb(255, 255, 255); --primary-color: #cccccc; --secondary-color: #ffffff; --tertiary-color: #fbf9eb; --quaternary-color: #cccccc; --text-color: #333333; --line-color: #009ddc; --label-border-color: #cccccc; --label-background-color: #ffffff; --label-text-color: #009ddc; --box-back-color: #f5f5f5; --box-stroke-color: #f5f5f5; --font-stack: Open Sans; --participant-stroke-width: 2; --border-thickness: 1; --font-size: 14;" version="1.1" viewBox="0 0 1557 586" width="1557px" zoomAndPan="magnify"><defs><style>

    svg g ellipse,
    svg g circle,
    svg g rect {
      stroke: var(--primary-color);
      stroke-width: var(--participant-stroke-width);
      /* fill: url(#image); */
      fill: var(--secondary-color);
      stroke-dasharray: 7500;
      animation: draw 5s linear;
    }

    svg g path {
      fill: var(--tertiary-color);
      stroke: var(--quaternary-color);
      stroke-width: 1.5;
      stroke-dasharray: 7500;
      animation: draw 5s linear;
    }

    svg g polygon {
      fill: var(--line-color);
      stroke-dasharray: 7500;
      animation: draw 5s linear;
    }

    svg g line,
    svg g polyline {
      stroke: var(--line-color);
      stroke-width: var(--border-thickness);
      stroke-dasharray: 7500;
      animation: draw 5s linear;
    }

    svg g text {
      fill: var(--text-color);
      font-family: var(--font-stack), "Tahoma";
      font-size: 14;
    }

    svg g line.dashed {
      stroke-dasharray: 5, 5;
      animation: dash 1s infinite;
    }

    svg g line.dotted {
      stroke-dasharray: 2, 2;
      animation: dash 1s infinite;
    }

    svg g line.skipped {
      stroke-dasharray: 1, 4;
      animation: dash 1s infinite;
    }

    svg g line.labelDivider {
      stroke-width: 2px;
    }

    svg g .label {
      stroke: var(--label-border-color);
      fill: var(--label-background-color);
    }
    svg g .labelText {
      fill: var(--label-text-color);
    }

    svg g path.actor {
      stroke: var(--primary-color);
      stroke-width: 2;
    }

    svg g path.note {
      stroke: var(--quaternary-color);
      fill: var(--tertiary-color);
      stroke-width: 1;
      font-size: 12;
    }
    svg g polygon.note {
      stroke: var(--quaternary-color);
      fill: var(--tertiary-color);
      stroke-width: 1;
      font-size: 12;
    }

    svg g .transparent {
      fill: none;
    }

    svg g path.database {
      fill: var(--secondary-color);
      stroke: var(--primary-color);
      stroke-width: 1.5px;
    }

    svg g path.squiggly {
      fill: none !important;
      stroke: var(--line-color) !important;
    }

    svg g rect.box {
      fill: var(--box-back-color);
      stroke: var(--box-stroke-color);
    }
    svg g rect.titleBox {
      fill: none;
      stroke: white;
      stroke-width: 5;

    }
    svg g line.divider {
      stroke: var(--primary-color);
      stroke-width: 3.5;
    }
    svg g line.altDivider {
      stroke: var(--primary-color);
      stroke-dasharray: 2, 2;
    }


    svg g path.alt {
      fill: var(--primary-color);
      stroke: var(--primary-color);
    }

    svg g path.actorClass {
      fill: var(--primary-color);
      stroke: var(--primary-color);
    }

    </style>
    </defs><g><rect height="36.2969" rx="12.5" ry="12.5" width="90" x="10" y="274.0781"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="70" x="20" y="297.0732">树结构演变</text><rect height="36.2969" rx="12.5" ry="12.5" width="90" x="150" y="274.0781"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="70" x="160" y="297.0732">普通二叉树</text><rect height="36.2969" rx="12.5" ry="12.5" width="104" x="290" y="217.7813"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="84" x="300" y="240.7764">节点之间无序</text><path d="M240,292.2266 L250,292.2266 C265,292.2266 265,235.9297 280,235.9297 L290,235.9297 " class="null transparent"></path><rect height="36.2969" rx="12.5" ry="12.5" width="202" x="290" y="274.0781"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="182" x="300" y="297.0732">二叉搜索树（节点之间有序）</text><rect height="36.2969" rx="12.5" ry="12.5" width="48" x="542" y="20"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="28" x="552" y="42.9951">优点</text><rect height="36.2969" rx="12.5" ry="12.5" width="132" x="640" y="20"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="112" x="650" y="42.9951">增删改查 O(logn)</text><path d="M590,38.1484 L600,38.1484 C615,38.1484 615,38.1484 630,38.1484 L640,38.1484 " class="null transparent"></path><path d="M492,292.2266 L502,292.2266 C517,292.2266 517,38.1484 532,38.1484 L542,38.1484 " class="null transparent"></path><rect height="36.2969" rx="12.5" ry="12.5" width="48" x="542" y="302.2266"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="28" x="552" y="325.2217">缺点</text><rect height="36.2969" rx="12.5" ry="12.5" width="274" x="640" y="76.2969"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="254" x="650" y="99.292">极端情况会退化为链表，时间复杂度O(n)</text><path d="M590,320.375 L600,320.375 C615,320.375 615,94.4453 630,94.4453 L640,94.4453 " class="null transparent"></path><rect height="36.2969" rx="12.5" ry="12.5" width="146" x="640" y="330.375"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="126" x="650" y="353.3701">保证树平衡（改进）</text><rect height="36.2969" rx="12.5" ry="12.5" width="76" x="836" y="132.5938"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="56" x="846" y="155.5889">严格平衡</text><path d="M786,348.5234 L796,348.5234 C811,348.5234 811,150.7422 826,150.7422 L836,150.7422 " class="null transparent"></path><rect height="36.2969" rx="12.5" ry="12.5" width="62" x="836" y="188.8906"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="42" x="846" y="211.8857">弱平衡</text><path d="M786,348.5234 L796,348.5234 C811,348.5234 811,207.0391 826,207.0391 L836,207.0391 " class="null transparent"></path><rect height="36.2969" rx="12.5" ry="12.5" width="48" x="836" y="386.6719"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="28" x="846" y="409.667">缺点</text><rect height="36.2969" rx="12.5" ry="12.5" width="202" x="934" y="245.1875"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="182" x="944" y="268.1826">一个节点最多只有两个子节点</text><path d="M884,404.8203 L894,404.8203 C909,404.8203 909,263.3359 924,263.3359 L934,263.3359 " class="null transparent"></path><rect height="36.2969" rx="12.5" ry="12.5" width="146" x="934" y="414.8203"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="126" x="944" y="437.8154">多叉平衡树（改进）</text><rect height="36.2969" rx="12.5" ry="12.5" width="61" x="1130" y="325.9297"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="41" x="1140" y="348.9248">btree</text><rect height="85.1875" rx="12.5" ry="12.5" width="206" x="1241" y="301.4844"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="42" x="1251" y="324.4795">特点：</text><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="140" x="1255" y="340.7764">一个节点有多个子节点</text><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="154" x="1255" y="357.0732">树的高度远远小于红黑树</text><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="182" x="1255" y="373.3701">子节点和非子节点都保存数据</text><path d="M1191,344.0781 L1201,344.0781 C1216,344.0781 1216,344.0781 1231,344.0781 L1241,344.0781 " class="null transparent"></path><path d="M1080,432.9688 L1090,432.9688 C1105,432.9688 1105,344.0781 1120,344.0781 L1130,344.0781 " class="null transparent"></path><rect height="36.2969" rx="12.5" ry="12.5" width="71" x="1130" y="467.4141"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="51" x="1140" y="490.4092">bptree</text><rect height="68.8906" rx="12.5" ry="12.5" width="294" x="1251" y="406.6719"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="42" x="1261" y="429.667">特点：</text><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="266" x="1265" y="445.9639">非叶子节点只保存索引，叶子节点保存数据</text><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="238" x="1265" y="462.2607">叶子节点之间通过指针连接，方便遍历</text><path d="M1201,485.5625 L1211,485.5625 C1226,485.5625 1226,441.1172 1241,441.1172 L1251,441.1172 " class="null transparent"></path><rect height="68.8906" rx="12.5" ry="12.5" width="140" x="1251" y="495.5625"></rect><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="70" x="1261" y="518.5576">使用场景：</text><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="112" x="1265" y="534.8545">基于页的存储引擎</text><text font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="56" x="1265" y="551.1514">文件系统</text><path d="M1201,485.5625 L1211,485.5625 C1226,485.5625 1226,530.0078 1241,530.0078 L1251,530.0078 " class="null transparent"></path><path d="M1080,432.9688 L1090,432.9688 C1105,432.9688 1105,485.5625 1120,485.5625 L1130,485.5625 " class="null transparent"></path><path d="M884,404.8203 L894,404.8203 C909,404.8203 909,432.9688 924,432.9688 L934,432.9688 " class="null transparent"></path><path d="M786,348.5234 L796,348.5234 C811,348.5234 811,404.8203 826,404.8203 L836,404.8203 " class="null transparent"></path><path d="M590,320.375 L600,320.375 C615,320.375 615,348.5234 630,348.5234 L640,348.5234 " class="null transparent"></path><path d="M492,292.2266 L502,292.2266 C517,292.2266 517,320.375 532,320.375 L542,320.375 " class="null transparent"></path><path d="M240,292.2266 L250,292.2266 C265,292.2266 265,292.2266 280,292.2266 L290,292.2266 " class="null transparent"></path><path d="M100,292.2266 L110,292.2266 C125,292.2266 125,292.2266 140,292.2266 L150,292.2266 " class="null transparent"></path><!--SRC=[dLHTJzfG6BxlhpYNi4Ip6MCMhymsjyL8D4EzsasLZZI3Kr8EBhj3T2eEgHy8o131w68qVYn-14grVwRdjBtYB-o5CgrauhAcD-TzdkUyptE-XgA4bqbOn84m7-6U8LPUD-kRhBJ0j0nLyXo23whRftQyOAWfgYI1qQewYBMIC1Cre_RTpbsoN9cgYWji2zQAvkKUo1hQyWDwCGdqXfQyKxHLMXuu3ueEGFTATBdCCZMsUu36F24fYBqTMbDJ_wvbfJdp-8pDVwEBLuPMiEDncieQLTNUlBKgXmqjnNBNu8dkhxAT15L_ZdawvcvxqtUiipd8GciNLgK2YS2EfV_eJE5IL0zOMNFeZr2ezgih_aWeTu-uKJrorfOLutI_G9KZM5wZkWzrUhBcG5rcQ4cIZWjdfxhdkbTE4raGkdBQ8P8riD3G2XznXzyaD7VRHC1e7iF2WdsSXwsmz2Byz5mnrBIfxjdrTK2Rf3i5tKZPEwMxeJr_0_j4J_9iwvojdZvfxgc4aV-8sFIZNDyxL8uSIt0JgBO5vysDkjssWhcnrbs1ssVfIoorP6yiMtg9fG-QHpPRCsvrUswLfXV_mPvnevkPGrfKsVQPOvBkgh2cTkKArXeCqCGXU6ERwTOEP9UC-hLvKJVhknmt9C03uJmIYEF6GpmcaxvHD2l8KL72w4Llt_E-_jx-QO7m0vv9_1bBNp2QaS8HCIGW8eO5B-TvDpwAeb9CdX5GG8mIMPoE4H1xkH5-baSVOhZ96qJDaMV2vqN-uJz5D8ndHLd2OG4JRcJAvv3GUudu8n9faGVwUrw91Fa56JoXAH_tHlZ4nq84f3DIGCJ1GJGvyRRd9JVAus2C3q8Z0NEl9MWWVmNC_ni0]--></g></svg>
